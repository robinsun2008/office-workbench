<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地办公工作台 - 部门报告库</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>办公工作台</h1>
                <p>Office Workbench</p>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="/todo" class="nav-item">
                    <span class="nav-icon">📋</span>
                    <span>待办任务</span>
                </a>
                <a href="/memo" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span>工作备忘录</span>
                </a>
                <a href="/focus" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>重点关注</span>
                </a>
                <a href="/report" class="nav-item active">
                    <span class="nav-icon">📄</span>
                    <span>部门报告库</span>
                </a>
                <a href="/config" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span>系统配置</span>
                </a>
            </nav>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">部门报告库</h1>
                <p class="page-desc">存储各类部门文档，支持万字级长文本和全文检索</p>
            </div>
            
            <!-- 搜索筛选栏 -->
            <div class="card">
                <div class="card-body">
                    <div class="filter-bar">
                        <input type="text" id="reportSearchInput" class="form-control search-input" placeholder="搜索标题或内容...">
                        <select id="reportCategoryFilter" class="form-control">
                            <option value="">全部分类</option>
                        </select>
                        <input type="text" id="reportTagFilter" class="form-control" placeholder="按标签筛选..." style="width: 150px;">
                        <button class="btn btn-primary" onclick="ReportModule.openCreateModal()">新建报告</button>
                        <button class="btn btn-secondary" onclick="printPage()">打印</button>
                    </div>
                </div>
            </div>
            
            <!-- 报告列表 -->
            <div id="reportList"></div>
        </main>
    </div>
    
    <!-- 新建/编辑报告模态框 -->
    <div class="modal-overlay" id="reportModal">
        <div class="modal" style="max-width: 800px;">
            <div class="modal-header">
                <h2 class="modal-title" id="reportModalTitle">新建报告</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="reportForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">报告标题 *</label>
                            <input type="text" id="reportTitle" class="form-control" placeholder="请输入报告标题" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">报告分类</label>
                            <select id="reportCategory" class="form-control">
                                <option value="">请选择分类</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">自定义标签</label>
                        <input type="text" id="reportTags" class="form-control" placeholder="多个标签用逗号分隔">
                    </div>
                    <div class="form-group">
                        <label class="form-label">报告内容</label>
                        <textarea id="reportContent" class="form-control" rows="15" placeholder="请输入报告内容，支持万字级长文本"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('reportModal')">取消</button>
                <button class="btn btn-primary" onclick="ReportModule.saveReport()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 查看报告模态框 -->
    <div class="modal-overlay" id="viewReportModal">
        <div class="modal" style="max-width: 800px;">
            <div class="modal-header">
                <h2 class="modal-title" id="viewReportTitle">报告详情</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="text-muted mb-2" style="font-size: 14px;">
                    <span>分类：<span id="viewReportCategory"></span></span> |
                    <span>标签：<span id="viewReportTags"></span></span> |
                    <span>创建时间：<span id="viewReportTime"></span></span>
                </div>
                <div style="white-space: pre-wrap; font-size: 14px; line-height: 1.8;" id="viewReportContent"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('viewReportModal')">关闭</button>
                <button class="btn btn-secondary" onclick="printPage()">打印</button>
            </div>
        </div>
    </div>
    
    <!-- 版本号 -->
    <div class="version-footer">
        <span>版本: {{ version }}</span>
    </div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
