<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地办公工作台 - 系统配置</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>办公工作台</h1>
                <p>Office Workbench</p>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="/todo" class="nav-item">
                    <span class="nav-icon">📋</span>
                    <span>待办任务</span>
                </a>
                <a href="/memo" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span>工作备忘录</span>
                </a>
                <a href="/focus" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>重点关注</span>
                </a>
                <a href="/report" class="nav-item">
                    <span class="nav-icon">📄</span>
                    <span>部门报告库</span>
                </a>
                <a href="/config" class="nav-item active">
                    <span class="nav-icon">⚙️</span>
                    <span>系统配置</span>
                </a>
            </nav>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">系统配置中心</h1>
                <p class="page-desc">自定义维护全局基础字典数据</p>
            </div>
            
            <!-- 添加配置 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">添加配置项</h2>
                </div>
                <div class="card-body">
                    <form id="configForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">配置类型</label>
                                <select id="configType" class="form-control">
                                    <option value="task_tag">任务标签</option>
                                    <option value="team">指派团队</option>
                                    <option value="person">指派人员</option>
                                    <option value="focus_area">关注领域</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">配置值</label>
                                <input type="text" id="configValue" class="form-control" placeholder="请输入配置值" required>
                            </div>
                            <div class="form-group" style="display: flex; align-items: flex-end;">
                                <button type="submit" class="btn btn-primary">添加</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- 任务标签配置 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">任务标签</h2>
                </div>
                <div class="card-body">
                    <div id="config-task_tag"></div>
                </div>
            </div>
            
            <!-- 指派团队配置 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">指派团队</h2>
                </div>
                <div class="card-body">
                    <div id="config-team"></div>
                </div>
            </div>
            
            <!-- 指派人员配置 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">指派人员</h2>
                </div>
                <div class="card-body">
                    <div id="config-person"></div>
                </div>
            </div>
            
            <!-- 关注领域配置 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">关注领域</h2>
                </div>
                <div class="card-body">
                    <div id="config-focus_area"></div>
                </div>
            </div>
            
            <!-- 报告分类配置 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">报告分类</h2>
                    <button class="btn btn-primary btn-sm" onclick="ConfigModule.addReportCategory()">+ 添加分类</button>
                </div>
                <div class="card-body">
                    <div id="config-report_category"></div>
                    <p class="text-muted mt-2" style="font-size: 12px;">
                        系统默认分类"其他"不可删除，删除分类后其下报告将自动转至"其他"分类。
                    </p>
                </div>
            </div>
            
            <!-- 数据管理 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">数据导入导出</h2>
                </div>
                <div class="card-body">
                    <div class="btn-group">
                        <button class="btn btn-success" onclick="exportAllData()">导出全部数据</button>
                        <button class="btn btn-secondary" onclick="importData()">导入数据</button>
                        <button class="btn btn-secondary" onclick="exportAttachments()">导出附件</button>
                    </div>
                    <p class="text-muted mt-2" style="font-size: 12px;">
                        导出的ZIP文件包含所有业务数据和附件信息，可用于数据备份或迁移到其他设备。
                    </p>
                </div>
            </div>
            
            <!-- 删除清理 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">删除清理</h2>
                </div>
                <div class="card-body">
                    <button class="btn btn-danger" onclick="ConfigModule.cleanupDeleted()">清理已删除记录</button>
                    <p class="text-muted mt-2" style="font-size: 12px;">
                        此操作将永久删除所有标记为"已删除"的待办任务和重点关注事项及其关联附件，操作不可恢复。
                    </p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 版本号 -->
    <div class="version-footer">
        <span>版本: {{ version }}</span>
    </div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
