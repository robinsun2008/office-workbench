<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地办公工作台 - 工作备忘录</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>办公工作台</h1>
                <p>Office Workbench</p>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="/todo" class="nav-item">
                    <span class="nav-icon">📋</span>
                    <span>待办任务</span>
                </a>
                <a href="/memo" class="nav-item active">
                    <span class="nav-icon">📝</span>
                    <span>工作备忘录</span>
                </a>
                <a href="/focus" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>重点关注</span>
                </a>
                <a href="/report" class="nav-item">
                    <span class="nav-icon">📄</span>
                    <span>部门报告库</span>
                </a>
                <a href="/config" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span>系统配置</span>
                </a>
            </nav>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">工作备忘录</h1>
                <p class="page-desc">记录工作要点，支持万字级长文本和附件上传</p>
            </div>
            
            <!-- 搜索筛选栏 -->
            <div class="card">
                <div class="card-body">
                    <div class="filter-bar">
                        <input type="text" id="memoSearchInput" class="form-control search-input" placeholder="搜索标题或内容...">
                        <input type="text" id="memoTagFilter" class="form-control" placeholder="按标签筛选..." style="width: 150px;">
                        <button class="btn btn-primary" onclick="MemoModule.openCreateModal()">新建备忘录</button>
                        <button class="btn btn-secondary" onclick="printPage()">打印</button>
                    </div>
                </div>
            </div>
            
            <!-- 备忘录列表 -->
            <div id="memoList"></div>
        </main>
    </div>
    
    <!-- 新建/编辑备忘录模态框 -->
    <div class="modal-overlay" id="memoModal">
        <div class="modal" style="max-width: 800px;">
            <div class="modal-header">
                <h2 class="modal-title" id="memoModalTitle">新建备忘录</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="memoForm">
                    <div class="form-group">
                        <label class="form-label">标题 *</label>
                        <input type="text" id="memoTitle" class="form-control" placeholder="请输入标题" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">自定义标签</label>
                        <input type="text" id="memoTags" class="form-control" placeholder="多个标签用逗号分隔">
                    </div>
                    <div class="form-group">
                        <label class="form-label">正文内容</label>
                        <textarea id="memoContent" class="form-control" rows="15" placeholder="请输入备忘内容，支持万字级长文本"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('memoModal')">取消</button>
                <button class="btn btn-primary" onclick="MemoModule.saveMemo()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 版本号 -->
    <div class="version-footer">
        <span>版本: {{ version }}</span>
    </div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
